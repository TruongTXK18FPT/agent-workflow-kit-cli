name: Release Package

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Execute Test Suite (Node.js v${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - name: 📂 Checkout Source Code
        uses: actions/checkout@v4

      - name: 🟢 Set Up Node.js Environment (v${{ matrix.node-version }})
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📦 Install Project Dependencies (npm ci)
        run: npm ci

      - name: 🧪 Run Automated Tests (Vitest)
        run: npm test

  publish:
    name: Publish Release Bundle to NPM Registry
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout Source Code
        uses: actions/checkout@v4

      - name: 🟢 Set Up Node.js Environment (v20.x)
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org/'
          cache: 'npm'

      - name: 📦 Install Project Dependencies (npm ci)
        run: npm ci

      - name: 🛠️ Compile TypeScript Code (npm run build)
        run: npm run build

      - name: 🚀 Publish Package to NPM (npm publish)
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
